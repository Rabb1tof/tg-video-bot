services:

  # ── Telegram Local Bot API Server ──────────────────────────────────────────
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: botdb
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d botdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Bot ────────────────────────────────────────────────────────────────────
  bot:
    image: ghcr.io/rabb1tof/tg-video-bot:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_LOCAL_API: http://telegram-bot-api:8081
      STORAGE_CHANNEL_ID: ${STORAGE_CHANNEL_ID}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-20}
      WORKER_COUNT: ${WORKER_COUNT:-5}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
      CACHE_TTL_HOURS: ${CACHE_TTL_HOURS:-24}
      HOT_CACHE_TTL_HOURS: ${HOT_CACHE_TTL_HOURS:-168}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-50}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_IDS: ${ADMIN_IDS:-}
      DATABASE_URL: postgres://bot:${POSTGRES_PASSWORD}@postgres:5432/botdb?sslmode=disable
    volumes:
      - /tmp/tg-video-bot:/tmp/tg-video-bot

volumes:
  redis-data:
  postgres-data:
  telegram-bot-api-data:
